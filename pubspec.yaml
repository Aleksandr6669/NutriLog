name: nutri_log
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  google_fonts: ^4.0.0
  provider: ^6.0.0
  material_symbols_icons: ^4.0.0
  percent_indicator: ^4.0.0
  go_router: ^12.0.0

  # Functionality
  image_picker: ^1.0.0
  http: ^1.1.0
  flutter_dotenv: ^5.0.0
  fl_chart: ^0.65.0
  intl: ^0.18.0
  table_calendar: ^3.0.0
  path_provider: ^2.0.0
  shared_preferences: ^2.0.0
  uuid: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/
    - assets/data/daily_log.json
    - assets/data/profile.json
    - assets/data/recipes.json
  