name: nutri_log
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.2+14

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Theming
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  material_symbols_icons: ^4.2906.0
  percent_indicator: ^4.2.3
  go_router: ^13.2.0 # Added go_router

  # Functionality
  image_picker: ^1.2.1
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  table_calendar: ^3.2.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  home_widget: ^0.8.0
  health: ^13.3.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  package_info_plus: ^8.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  # 12.4.0 использует API, недоступный на части Xcode в CI (isiOSAppOnVision)
  device_info_plus: 12.1.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/data/

  
  