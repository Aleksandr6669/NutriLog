name: nutri_log
description: "A new Flutter project."
publish_to: 'none'
version: 1.3.2+34

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Theming
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  material_symbols_icons: ^4.2906.0
  percent_indicator: ^4.2.3
  go_router: ^17.2.3 # Added go_router

  # Functionality
  image_picker: ^1.2.1
  http: ^1.2.0
  flutter_dotenv: ^6.0.1
  fl_chart: ^1.1.1
  intl: ^0.20.2
  table_calendar: ^3.2.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  home_widget: ^0.9.1
  health: ^13.3.1
  # flutter_local_notifications: ^17.2.4
  awesome_notifications: ^0.11.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  package_info_plus: ^10.1.0
  app_settings: ^7.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  connectivity_plus: ^7.1.1
  encrypt: ^5.0.3
  mobile_scanner: ^7.2.0
  speech_to_text: ^7.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  # 12.4.0 использует API, недоступный на части Xcode в CI (isiOSAppOnVision)
  device_info_plus: ^13.1.0
  meta: ^1.18.2
  pointycastle: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/data/


