name: Build Android APK signed old

on:
  workflow_dispatch:

jobs:
  build_android:
    name: 🎉 Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter clean
      - run: rm pubspec.lock
      - run: flutter pub get

      - name: Create .env from secret
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "USDA_API_KEY=${{ secrets.USDA_API_KEY }}" >> .env

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/mykeys.keystore

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons \
          --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
          --dart-define=USDA_API_KEY=${{ secrets.USDA_API_KEY }}

      - name: Align and Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v -p 4 \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android/app/mykeys.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            build/app/outputs/flutter-apk/app-aligned.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-aligned.apk
