name: Build iOS IPA (Smart)

on:
  workflow_dispatch:

jobs:
  build_ios_development:
    name: 🍎 iOS Build Smart
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - name: Create .env from secret
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        working-directory: ios

      - name: Fix Podfile cycle (Xcode 16 + Flutter)
        working-directory: ios
        run: |
          # Disable dependency analysis for Flutter script phases to fix cycle error
          ruby - <<'EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Runner.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'Runner'
            target.build_phases.each do |phase|
              next unless phase.is_a?(Xcodeproj::Project::Object::PBXShellScriptBuildPhase)
              if phase.name&.include?('Flutter') || phase.shell_script&.include?('flutter')
                phase.always_out_of_date = '1'
              end
            end
          end
          project.save
          EOF

      - name: Build Xcode Archive
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/ios/archive/Runner.xcarchive \
            -parallelizeTargets \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM=""

      - name: Show archive structure
        if: always()
        run: |
          echo "=== Archive structure ==="
          if [ -d "build/ios/archive/Runner.xcarchive" ]; then
            find build/ios/archive/Runner.xcarchive -name "*.app" -type d
            echo "--- Full structure ---"
            find build/ios/archive/Runner.xcarchive -type d | head -30
          else
            echo "❌ Archive not created"
          fi

      - name: Package IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload

          APP_PATH=$(find build/ios/archive/ -name "Runner.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -qq -r -9 FlutterIpaExport.ipa Payload
          echo "✅ IPA size:"
          ls -lh FlutterIpaExport.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NutriLog-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
          retention-days: 7
