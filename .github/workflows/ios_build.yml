name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build_ios_development:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter clean
      - run: rm pubspec.lock
      - run: flutter pub get
      - name: Create .env from secret
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "USDA_API_KEY=${{ secrets.USDA_API_KEY }}" >> .env
      - name: Patch objectVersion for CocoaPods compatibility
        run: sed -i '' 's/objectVersion = 70/objectVersion = 60/' ios/Runner.xcodeproj/project.pbxproj
      - run: pod install --project-directory=ios

      - run: flutter build ios --release --no-codesign --no-tree-shake-icons --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} --dart-define=USDA_API_KEY=${{ secrets.USDA_API_KEY }}
      - run: mkdir build/ios/iphoneos/Payload
      - run: mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
      
      - name: Zip output
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: development-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa