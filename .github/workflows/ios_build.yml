name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build_ios_development:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.18.0
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get
      - name: Create .env from secret
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        working-directory: ios
      - run: flutter build ios --config-only --release --no-codesign --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
      - name: Build archive (no code signing)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true
          # Show archive structure for debugging
          echo "=== Archive structure ==="
          find build/ios/archive/ -name "*.app" -type d 2>/dev/null || echo "No .app found in archive"
          ls -la build/ios/archive/ 2>/dev/null || echo "Archive directory not found"
      - name: Package IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          # Search for Runner.app anywhere inside the archive
          APP_PATH=$(find build/ios/archive/Runner.xcarchive -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found in archive!"
            find build/ios/archive/ -type d | head -30
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -qq -r -9 FlutterIpaExport.ipa Payload
          echo "IPA created successfully!"
          ls -lh FlutterIpaExport.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: development-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa