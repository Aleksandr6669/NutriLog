name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build_ios_development:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get
      - name: Create .env from secret
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      - run: flutter build ipa --release --no-codesign --no-tree-shake-icons --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
      - run: mkdir -p build/ios/iphoneos/Payload
      - run: cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/iphoneos/Payload/Runner.app 
      
      - name: Zip output
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: development-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa